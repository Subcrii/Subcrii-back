version: "16"

services:
  postgres:
    image: postgres:16
    container_name: subcrii-db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: subcrii_pgadmin
    restart: always
    env_file:
      - .env
    ports:
      - "8082:82"

volumes:
  postgres_data:
